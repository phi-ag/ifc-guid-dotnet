name: Release Please

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          target-branch: main

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Restore
        if: ${{ steps.release.outputs.release_created }}
        uses: ./.github/actions/restore

      - name: Pack
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet pack

      - name: NuGet login
        if: ${{ steps.release.outputs.release_created }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet nuget push src/bin/Release/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: Generate SBOM
        if: ${{ steps.release.outputs.release_created }}
        run: |
          dotnet tool restore
          dotnet dotnet-CycloneDX IfcGuid.slnx -F json --filename sbom.cdx.json \
            --set-version ${{ steps.release.outputs.version }} \
            --github-bearer-token ${{ secrets.GITHUB_TOKEN }}

      - name: Attest package
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: src/bin/Release/*.nupkg
          sbom-path: sbom.cdx.json

      - name: Upload SBOM
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} sbom.cdx.json
