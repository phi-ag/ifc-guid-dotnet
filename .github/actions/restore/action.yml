name: restore

runs:
  using: composite
  steps:
    - name: Install dotnet
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        global-json-file: global.json
        cache: true
        cache-dependency-path: "**/packages.lock.json"

    - name: Restore
      shell: bash
      run: dotnet restore --locked-mode
